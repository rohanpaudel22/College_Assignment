<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Types of Computers:</h1><br>
    <p1>On the basis of size:</p1>,<br>
    <input type="radio" id="Super"  value="Super">
    <label for="Super">Super</label><br>
    <input type="radio" id="Mini"  value="Mini">
    <label for="Mini">Mini</label><br>
    <input type="radio" id="Micro"  value="Micro">
    <label for="Micro">Micro</label><br>
    <input type="radio" id="Mainframe"  value="Mainframe">
    <label for="Mainframe">Mainframe</label><br><br>

    <h3>On the basis of computer:</h3>
    <input type="radio" id="Analog"  value="Analog">
    <label for="Analog">Analog</label><br>
    <input type="radio" id="Digital"  value="Digital">
    <label for="Digital">Digital</label><br>
    <input type="radio" id="Hybrid"  value="Hybrid">
    <label for="Hybrid">Hybrid</label><br><br>

    <h4>On the basis of brand:</h4>
    <input type="checkbox" id="IBM PC"  value="IBM PC">
    <label for="IBM PC">IBM PC</label><br>
    <input type="checkbox" id="IBM Compatible"  value="IBM Compatible">
    <label for="IBM Compatible">IBM Compatible</label><br>
    <input type="checkbox" id="Macintosh"  value="Macintosh">
    <label for="Macintosh">Machintosh</label><br><br>

</body>
</html>
